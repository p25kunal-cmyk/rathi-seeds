<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Rathi Seeds - Bill Management & Party Allotment System for seed trading">
  <meta name="theme-color" content="#e8f0eb" id="themeColorMeta">

  <!-- Prevent flash of wrong theme -->
  <script>
    (function() {
      var t = localStorage.getItem('rathiSeeds_theme');
      if (t === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
        var m = document.querySelector('#themeColorMeta');
        if (m) m.content = '#0f1a15';
      }
    })();
  </script>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Rathi Seeds">
  <title>Rathi Seeds — Bill Manager</title>

  <!-- Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- Stylesheet -->
  <link rel="stylesheet" href="css/styles.css">

  <!-- Icons -->
  <link rel="icon" href="assets/icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="assets/icon-192.png">
</head>
<body>
  <div id="app">

    <!-- ===== HEADER ===== -->
    <header class="app-header">
      <div class="app-header__logo">
        <div class="app-header__icon">R</div>
        <div>
          <div class="app-header__title">Rathi Seeds</div>
          <div class="app-header__subtitle">Dashboard</div>
        </div>
      </div>
      <div class="app-header__right">
        <button class="theme-toggle" id="themeToggle" title="Toggle dark mode">
          <span id="themeIcon">🌙</span>
        </button>
      </div>
    </header>

    <!-- Login Bypassed for Phase 2 Testing -->

    <!-- ===== NAVIGATION ===== -->
    <nav class="nav-tabs" id="mainNav">
      <button class="nav-btn active" onclick="App.switchView('dashboard')">📊 Dashboard</button>
      <button class="nav-btn" onclick="App.switchView('billing')">🧾 Billing Center</button>
      <button class="nav-btn" onclick="App.switchView('parties')">👥 Parties</button>
      <button class="nav-btn" onclick="App.switchView('setup')">⚙️ Setup</button>
    </nav>

    <!-- ===== MAIN CONTENT ===== -->
    <main class="app-main">

      <!-- 1) DASHBOARD VIEW -->
      <section id="dashboardView" class="view active">
        <h1 class="section-title">Party Performance</h1>
        <p class="section-subtitle">Live ledger of all parties and outstanding balances.</p>
        <div id="dashboardContainer" class="dashboard-grid">
          <!-- Populated by JS -->
        </div>
      </section>

      <!-- 2) BILLING VIEW -->
      <section id="billingView" class="view">
        <h1 class="section-title">Billing Center</h1>
        <p class="section-subtitle">Generate bills and send to WhatsApp.</p>
        
        <div class="card mb-16">
          <label class="form-label">Select Company</label>
          <select id="billingCompanySelect" class="form-select" onchange="App.onBillingCompanyChange()">
            <option value="">-- Choose Company --</option>
          </select>
        </div>

        <div id="billingPartiesContainer">
          <!-- Populated by JS after company selection -->
        </div>
      </section>

      <!-- 3) PARTIES VIEW -->
      <section id="partiesView" class="view">
        <div class="action-bar mb-16">
          <div>
            <h1 class="section-title">Parties Directory</h1>
            <p class="section-subtitle">Manage dealers and retailers.</p>
          </div>
          <button class="btn btn--primary" onclick="App.openAddPartyModal()">+ Add Party</button>
        </div>
        <div id="partiesListContainer" class="parties-grid">
          <!-- Populated by JS -->
        </div>
      </section>

      <!-- 4) SETUP VIEW -->
      <section id="setupView" class="view">
        <div class="action-bar mb-16">
          <div>
            <h1 class="section-title">Database Setup</h1>
            <p class="section-subtitle">Manage Companies and Seed Rates.</p>
          </div>
        </div>

        <div class="setup-grid">
          <div class="card">
            <h3>Companies</h3>
            <button class="btn btn--outline btn--sm mt-8" onclick="App.openAddCompanyModal()">+ Add Company</button>
            <button class="btn btn--outline btn--sm mt-8" onclick="App.importDatabase()">Import Master Excel</button>
            <div id="setupCompaniesList" class="mt-16"></div>
          </div>
          <div class="card">
            <h3>Seed Types</h3>
            <button class="btn btn--outline btn--sm mt-8" onclick="App.openAddSeedModal()">+ Add Seed</button>
            <div id="setupSeedsList" class="mt-16"></div>
          </div>
        </div>
      </section>
    </main>

    <!-- ===== MODAL OVERLAY ===== -->
    <div id="addModalOverlay" class="modal-overlay" onclick="App.closeModals(event)">
      <div id="addModalSheet" class="modal-sheet" onclick="event.stopPropagation()">
        <!-- Populated by JS -->
      </div>
    </div>

    <!-- ===== TOAST ===== -->
    <div class="toast" id="toast"></div>

  </div>

  <!-- ===== SCRIPTS ===== -->
  <!-- SheetJS (xlsx) for Excel parsing — loaded from CDN -->
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>

  <!-- App modules -->
  <script src="js/bill-generator.js"></script>
  <script type="module" src="js/app.js"></script>

  <!-- ===== SERVICE WORKER & INSTALL PROMPT ===== -->
  <script>
    // Register Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then((reg) => console.log('SW registered:', reg.scope))
          .catch((err) => console.warn('SW registration failed:', err));
      });
    }

    // PWA Install Prompt
    let deferredPrompt = null;

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      // Show the install button
      const installBtn = document.getElementById('installBtn');
      if (installBtn) installBtn.style.display = 'flex';
    });

    document.getElementById('installBtn')?.addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      console.log('Install prompt outcome:', outcome);
      deferredPrompt = null;
      document.getElementById('installBtn').style.display = 'none';
    });

    // Hide install button if already installed
    window.addEventListener('appinstalled', () => {
      deferredPrompt = null;
      const installBtn = document.getElementById('installBtn');
      if (installBtn) installBtn.style.display = 'none';
      console.log('App installed successfully');
    });

    // ===== THEME TOGGLE =====
    (function() {
      const THEME_KEY = 'rathiSeeds_theme';
      const toggle = document.getElementById('themeToggle');
      const icon = document.getElementById('themeIcon');
      const metaColor = document.getElementById('themeColorMeta');

      function applyTheme(theme) {
        if (theme === 'dark') {
          document.documentElement.setAttribute('data-theme', 'dark');
          icon.textContent = '☀️';
          toggle.title = 'Switch to light mode';
          if (metaColor) metaColor.content = '#0f1a15';
        } else {
          document.documentElement.removeAttribute('data-theme');
          icon.textContent = '🌙';
          toggle.title = 'Switch to dark mode';
          if (metaColor) metaColor.content = '#e8f0eb';
        }
        localStorage.setItem(THEME_KEY, theme);
      }

      // Set initial icon based on stored theme
      const stored = localStorage.getItem(THEME_KEY);
      if (stored === 'dark') {
        icon.textContent = '☀️';
        toggle.title = 'Switch to light mode';
      }

      toggle.addEventListener('click', () => {
        const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        applyTheme(isDark ? 'light' : 'dark');
      });
    })();
  </script>
</body>
</html>

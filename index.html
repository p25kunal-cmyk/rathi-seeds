<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Rathi Seeds - Bill Management & Party Allotment System for seed trading">
  <meta name="theme-color" content="#e8f0eb" id="themeColorMeta">

  <!-- Prevent flash of wrong theme -->
  <script>
    (function() {
      var t = localStorage.getItem('rathiSeeds_theme');
      if (t === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
        var m = document.querySelector('#themeColorMeta');
        if (m) m.content = '#0f1a15';
      }
    })();
  </script>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Rathi Seeds">
  <title>Rathi Seeds — Bill Manager</title>

  <!-- Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- PDF Generation Library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- Stylesheet -->
  <link rel="stylesheet" href="css/styles.css">

  <!-- Icons -->
  <link rel="icon" href="assets/icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="assets/icon-192.png">
</head>
<body>
  <div id="app">

    <!-- ===== HEADER ===== -->
    <header class="app-header">
      <div class="app-header__logo">
        <div class="app-header__icon">R</div>
        <div>
          <div class="app-header__title">Rathi Seeds</div>
          <div class="app-header__subtitle">Bill Manager</div>
        </div>
      </div>
      <div class="app-header__right">
        <button class="btn btn--outline btn--sm" id="logoutBtn" style="display:none;" title="Log Out">
          Log Out
        </button>
        <button class="install-btn" id="installBtn" style="display:none;" title="Install App">
          <span class="install-btn__icon">📲</span>
          <span class="install-btn__text">Install</span>
        </button>
        <button class="theme-toggle" id="themeToggle" title="Toggle dark mode">
          <span id="themeIcon">🌙</span>
        </button>
      </div>
    </header>

    <!-- ===== LOGIN OVERLAY ===== -->
    <div id="loginView" class="login-overlay active">
      <div class="login-card">
        <div class="login-card__icon">🔒</div>
        <h2 class="login-card__title">Team Login</h2>
        <p class="login-card__subtitle">Enter the shared team credentials to access Rathi Seeds.</p>
        
        <form id="loginForm" class="login-form">
          <div class="input-group">
            <input type="email" id="loginEmail" placeholder="Email Address" required>
          </div>
          <div class="input-group">
            <input type="password" id="loginPassword" placeholder="Password" required>
          </div>
          <button type="submit" class="btn btn--primary btn--lg w-full mt-8" id="loginSubmitBtn">Sign In</button>
          <div id="loginError" class="login-error"></div>
        </form>
      </div>
    </div>

    <!-- ===== MAIN CONTENT ===== -->
    <main class="main-content">

      <!-- Upload View -->
      <section class="view-section" id="view-upload">
        <!-- Rendered by JS -->
      </section>

      <!-- Parties View -->
      <section class="view-section" id="view-parties">
        <!-- Rendered by JS -->
      </section>

      <!-- Bills View -->
      <section class="view-section" id="view-bills">
        <!-- Rendered by JS -->
      </section>

    </main>

    <!-- ===== BOTTOM NAVIGATION ===== -->
    <nav class="bottom-nav" id="bottomNav">
      <!-- Rendered by JS -->
    </nav>

    <!-- ===== MODAL OVERLAY ===== -->
    <div class="modal-overlay" id="modalOverlay">
      <div class="modal-sheet" id="modalSheet">
        <!-- Dynamic content -->
      </div>
    </div>

    <!-- ===== TOAST ===== -->
    <div class="toast" id="toast"></div>

  </div>

  <!-- ===== SCRIPTS ===== -->
  <!-- SheetJS (xlsx) for Excel parsing — loaded from CDN -->
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>

  <!-- App modules -->
  <script src="js/excel-parser.js"></script>
  <script src="js/bill-generator.js"></script>
  <script type="module" src="js/app.js"></script>

  <!-- ===== SERVICE WORKER & INSTALL PROMPT ===== -->
  <script>
    // Register Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then((reg) => console.log('SW registered:', reg.scope))
          .catch((err) => console.warn('SW registration failed:', err));
      });
    }

    // PWA Install Prompt
    let deferredPrompt = null;

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      // Show the install button
      const installBtn = document.getElementById('installBtn');
      if (installBtn) installBtn.style.display = 'flex';
    });

    document.getElementById('installBtn')?.addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      console.log('Install prompt outcome:', outcome);
      deferredPrompt = null;
      document.getElementById('installBtn').style.display = 'none';
    });

    // Hide install button if already installed
    window.addEventListener('appinstalled', () => {
      deferredPrompt = null;
      const installBtn = document.getElementById('installBtn');
      if (installBtn) installBtn.style.display = 'none';
      console.log('App installed successfully');
    });

    // ===== THEME TOGGLE =====
    (function() {
      const THEME_KEY = 'rathiSeeds_theme';
      const toggle = document.getElementById('themeToggle');
      const icon = document.getElementById('themeIcon');
      const metaColor = document.getElementById('themeColorMeta');

      function applyTheme(theme) {
        if (theme === 'dark') {
          document.documentElement.setAttribute('data-theme', 'dark');
          icon.textContent = '☀️';
          toggle.title = 'Switch to light mode';
          if (metaColor) metaColor.content = '#0f1a15';
        } else {
          document.documentElement.removeAttribute('data-theme');
          icon.textContent = '🌙';
          toggle.title = 'Switch to dark mode';
          if (metaColor) metaColor.content = '#e8f0eb';
        }
        localStorage.setItem(THEME_KEY, theme);
      }

      // Set initial icon based on stored theme
      const stored = localStorage.getItem(THEME_KEY);
      if (stored === 'dark') {
        icon.textContent = '☀️';
        toggle.title = 'Switch to light mode';
      }

      toggle.addEventListener('click', () => {
        const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        applyTheme(isDark ? 'light' : 'dark');
      });
    })();
  </script>
</body>
</html>
